apiVersion: v1
kind: ConfigMap
metadata:
  name: wp-setup
  labels:
    app: {{ .Release.Name }}
data:
  setup.sh: |
    #!/bin/bash
    set -e
    exec 1>&2  # Redirect output to stderr for logging
    
    echo "[SETUP] Starting WordPress/WooCommerce setup at $(date)"
    echo "[SETUP] Store: {{ .Release.Name }}"
    
    # Store configuration
    STORE_HOSTNAME="{{ .Values.wordpress.ingress.hostname | default (printf "%s.store.127.0.0.1.nip.io" .Release.Name) }}"
    STORE_URL="http://${STORE_HOSTNAME}"
    WP_DIR="/opt/bitnami/wordpress"
    WP_CONFIG="${WP_DIR}/wp-config.php"
    
    # Wait for WordPress to initialize wp-config.php
    echo "[SETUP] Waiting for WordPress initialization..."
    for i in {1..30}; do
      if [ -f "$WP_CONFIG" ]; then
        echo "[SETUP] WordPress initialized"
        break
      fi
      if [ $i -eq 30 ]; then
        echo "[SETUP] ERROR: WordPress not initialized after 60s"
        exit 1
      fi
      sleep 2
    done
    
    cd "$WP_DIR"
    
    # Wait for database to be ready before proceeding
    echo "[SETUP] Waiting for database connection..."
    for i in {1..30}; do
      if wp db check --allow-root 2>/dev/null; then
        echo "[SETUP] Database connection established"
        break
      fi
      if [ $i -eq 30 ]; then
        echo "[SETUP] ERROR: Database not ready after 60s"
        exit 1
      fi
      sleep 2
    done
    
    # 1. Fix wp-config.php WP_CLI hostname (critical fix)
    echo "[SETUP] Fixing wp-config.php WP_CLI hostname..."
    if grep -q "\$_SERVER\['HTTP_HOST'\] = '127.0.0.1';" "$WP_CONFIG" 2>/dev/null; then
      sed -i "s/\$_SERVER\['HTTP_HOST'\] = '127.0.0.1';/\$_SERVER['HTTP_HOST'] = '$STORE_HOSTNAME';/" "$WP_CONFIG"
      echo "[SETUP] Fixed wp-config.php hostname to: $STORE_HOSTNAME"
    else
      echo "[SETUP] wp-config.php hostname already configured"
    fi
    
    # 2. Create .htaccess file for permalinks (critical for routing)
    echo "[SETUP] Creating .htaccess file..."
    cat > "${WP_DIR}/.htaccess" << 'HTACCESS_EOF'
    # BEGIN WordPress
    <IfModule mod_rewrite.c>
    RewriteEngine On
    RewriteRule .* - [E=HTTP_AUTHORIZATION:%{HTTP:Authorization}]
    RewriteBase /
    RewriteRule ^index\.php$ - [L]
    RewriteCond %{REQUEST_FILENAME} !-f
    RewriteCond %{REQUEST_FILENAME} !-d
    RewriteRule . /index.php [L]
    </IfModule>
    # END WordPress
    HTACCESS_EOF
    echo "[SETUP] .htaccess created"
    
    # 3. Install WordPress if not already installed
    if wp core is-installed 2>/dev/null; then
      echo "[SETUP] WordPress already installed"
    else
      echo "[SETUP] Installing WordPress..."
      wp core install \
        --url="$STORE_URL" \
        --title="Urumi Store {{ .Release.Name }}" \
        --admin_user="{{ .Values.wordpress.wordpressUsername }}" \
        --admin_password="{{ .Values.wordpress.wordpressPassword }}" \
        --admin_email="{{ .Values.wordpress.wordpressEmail }}" \
        --skip-email
      echo "[SETUP] WordPress installed"
    fi
    
    # 4. Set WordPress URLs to match ingress hostname
    echo "[SETUP] Configuring WordPress URLs..."
    wp option update siteurl "$STORE_URL" 2>&1 || true
    wp option update home "$STORE_URL" 2>&1 || true
    wp option update permalink_structure '/%postname%/' 2>&1 || true
    echo "[SETUP] URLs configured: $STORE_URL"
    
    # 5. Ensure admin user has administrator role
    echo "[SETUP] Configuring admin user..."
    wp user set-role "{{ .Values.wordpress.wordpressUsername }}" administrator 2>&1 || true
    
    # 6. Install and activate WooCommerce
    echo "[SETUP] Setting up WooCommerce..."
    if ! wp plugin is-installed woocommerce 2>/dev/null; then
      wp plugin install woocommerce --activate --force 2>&1 || true
    else
      wp plugin activate woocommerce 2>&1 || true
    fi
    
    # 7. Install and activate Storefront theme
    echo "[SETUP] Installing Storefront theme..."
    if ! wp theme is-installed storefront 2>/dev/null; then
      wp theme install storefront --activate --force 2>&1 || true
    else
      wp theme activate storefront 2>&1 || true
    fi
    
    # Wait for WooCommerce to initialize
    sleep 5
    
    # 8. Configure WooCommerce settings
    echo "[SETUP] Configuring WooCommerce..."
    
    # Mark onboarding as completed
    wp eval '
    $profile = get_option("woocommerce_onboarding_profile", array());
    if (!is_array($profile)) $profile = array();
    $profile["completed"] = true;
    $profile["skipped"] = true;
    update_option("woocommerce_onboarding_profile", $profile);
    update_option("woocommerce_admin_disabled", "no");
    update_option("woocommerce_onboarding_opt_in", "yes");
    if (!get_option("woocommerce_admin_install_timestamp")) {
        update_option("woocommerce_admin_install_timestamp", time());
    }
    wp_cache_flush();
    echo "[SETUP] WooCommerce onboarding configured\n";
    ' 2>&1 || true
    
    # Set store address
    wp option update woocommerce_store_address "123 Main Street" 2>/dev/null || true
    wp option update woocommerce_store_city "San Francisco" 2>/dev/null || true
    wp option update woocommerce_default_country "US:CA" 2>/dev/null || true
    wp option update woocommerce_store_postcode "94102" 2>/dev/null || true
    
    # Enable payment gateways
    wp option update woocommerce_cod_settings '{"enabled":"yes","title":"Cash on Delivery","description":"Pay with cash upon delivery."}' --format=json 2>/dev/null || true
    wp option update woocommerce_cheque_settings '{"enabled":"yes","title":"Dummy Payment Gateway","description":"Test payment gateway - no actual payment processed."}' --format=json 2>/dev/null || true
    
    # 9. Create sample products
    echo "[SETUP] Creating sample products..."
    wp eval '
    if (!class_exists("WC_Product_Simple")) {
        echo "[SETUP] WooCommerce not ready\n";
        exit(0);
    }
    
    $products = [
        ["name" => "Classic T-Shirt", "price" => "19.99", "desc" => "Comfortable cotton t-shirt", "sku" => "TSHIRT-001", "stock" => 50],
        ["name" => "Coffee Mug", "price" => "12.99", "desc" => "Ceramic coffee mug", "sku" => "MUG-001", "stock" => 30],
        ["name" => "Premium Notebook", "price" => "8.99", "desc" => "High-quality notebook", "sku" => "NOTEBOOK-001", "stock" => 100],
        ["name" => "Warm Beanie", "price" => "15.99", "desc" => "Cozy beanie", "sku" => "BEANIE-001", "stock" => 25],
        ["name" => "Water Bottle", "price" => "24.99", "desc" => "Stainless steel water bottle", "sku" => "BOTTLE-001", "stock" => 40]
    ];
    
    $created = 0;
    foreach ($products as $p) {
        if (wc_get_product_id_by_sku($p["sku"])) {
            continue;
        }
        
        $product = new WC_Product_Simple();
        $product->set_name($p["name"]);
        $product->set_description($p["desc"]);
        $product->set_regular_price($p["price"]);
        $product->set_sku($p["sku"]);
        $product->set_manage_stock(true);
        $product->set_stock_quantity($p["stock"]);
        $product->set_stock_status("instock");
        $product->set_status("publish");
        
        if ($product->save()) {
            $created++;
        }
    }
    echo "[SETUP] Created $created products\n";
    ' 2>&1 || true
    
    # 10. Configure WooCommerce pages
    echo "[SETUP] Setting up WooCommerce pages..."
    wp wc tool run install_pages --user="{{ .Values.wordpress.wordpressUsername }}" 2>&1 || true
    
    # Wait for shop page to be created
    sleep 5
    
    # Set shop page as homepage
    wp eval '
    $shop_id = wc_get_page_id("shop");
    if ($shop_id && $shop_id > 0) {
        update_option("show_on_front", "page");
        update_option("page_on_front", $shop_id);
        wp_cache_flush();
        echo "[SETUP] Shop page set as homepage (ID: $shop_id)\n";
    } else {
        echo "[SETUP] Shop page not found\n";
    }
    ' 2>&1 || true
    
    # 11. Flush rewrite rules (hard flush to update .htaccess)
    echo "[SETUP] Flushing rewrite rules..."
    wp rewrite flush --hard 2>&1 || true
    wp cache flush 2>/dev/null || true
    
    # 12. Final admin user configuration
    wp user set-role "{{ .Values.wordpress.wordpressUsername }}" administrator 2>&1 || true
    wp eval '
    $user = get_user_by("login", "{{ .Values.wordpress.wordpressUsername }}");
    if ($user) {
        $user->set_role("administrator");
        $user->add_cap("manage_woocommerce");
        $user->add_cap("manage_options");
        wp_cache_flush();
        echo "[SETUP] Admin user configured with WooCommerce capabilities\n";
    }
    ' 2>&1 || true
    
    echo "[SETUP] Setup completed successfully at $(date)"
    echo "[SETUP] Store URL: $STORE_URL"
    echo "[SETUP] Admin: $STORE_URL/wp-admin/"
    echo "[SETUP] Shop: $STORE_URL/"
