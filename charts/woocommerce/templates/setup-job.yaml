apiVersion: batch/v1
kind: Job
metadata:
  name: {{ .Release.Name }}-setup-job
  namespace: {{ .Release.Namespace }}
  labels:
    app: {{ .Release.Name }}
    component: setup
  annotations:
    "helm.sh/hook": post-install,post-upgrade
    "helm.sh/hook-weight": "5"
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
spec:
  backoffLimit: 2
  activeDeadlineSeconds: 600
  template:
    metadata:
      labels:
        app: {{ .Release.Name }}
        component: setup
    spec:
      restartPolicy: OnFailure
      containers:
        - name: setup
          image: "bitnami/wordpress:latest"
          command: ["/bin/bash", "/scripts/setup.sh"]
          env:
            - name: MARIADB_HOST
              value: "{{ .Release.Name }}-mariadb"
            - name: WORDPRESS_DATABASE_USER
              value: "root"
            - name: WORDPRESS_DATABASE_PASSWORD_FILE
              value: "/secrets/mariadb-root-password"
            - name: WORDPRESS_DATABASE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ .Release.Name }}-mariadb
                  key: mariadb-root-password
          volumeMounts:
            - name: setup-script
              mountPath: /scripts
            - name: wordpress-data
              mountPath: /bitnami/wordpress
            - name: mariadb-secret
              mountPath: /secrets
              readOnly: true
      volumes:
        - name: setup-script
          configMap:
            name: wp-setup
            defaultMode: 0755
        - name: wordpress-data
          persistentVolumeClaim:
            claimName: {{ .Release.Name }}-wordpress
        - name: mariadb-secret
          secret:
            secretName: {{ .Release.Name }}-mariadb
