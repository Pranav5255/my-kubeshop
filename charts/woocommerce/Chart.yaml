apiVersion: v2
name: woocommerce
description: A Helm chart for WooCommerce using Bitnami WordPress and MariaDB
type: application
version: 0.1.0
appVersion: "1.0.0"

dependencies:
  - name: wordpress
    version: 28.1.5
    repository: https://charts.bitnami.com/bitnami
    condition: wordpress.enabled
  - name: mariadb
    version: 24.0.4
    repository: https://charts.bitnami.com/bitnami
    condition: mariadb.enabled
