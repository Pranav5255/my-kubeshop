# Default values for woocommerce.
# This is a wrapper chart.

wordpress:
  enabled: true
  wordpressUsername: user
  wordpressPassword: password
  wordpressEmail: user@example.com
  
  mariadb:
    enabled: false # We use the separate dependency
  
  externalDatabase:
    host: "mariadb-placeholder" 
    user: root
    password: "root-password"
    database: bitnami_wordpress

  # Lifecycle hook to run setup inside WordPress container (runs in background)
  lifecycleHooks:
    postStart:
      exec:
        command:
          - /bin/bash
          - -c
          - |
            # Run setup script in background to avoid blocking container startup
            nohup /bin/bash -c '
              # Wait for WordPress to be fully initialized
              until [ -f /opt/bitnami/wordpress/wp-config.php ]; do
                echo "Waiting for WordPress initialization..." >> /tmp/setup.log 2>&1
                sleep 2
              done
              # Run setup script
              if [ -f /scripts/setup.sh ]; then
                /bin/bash /scripts/setup.sh >> /tmp/setup.log 2>&1
              fi
            ' > /dev/null 2>&1 &

  # Mount the setup script into WordPress container
  extraVolumes:
    - name: setup-script
      configMap:
        name: wp-setup
        defaultMode: 0755

  extraVolumeMounts:
    - name: setup-script
      mountPath: /scripts

  ingress:
    enabled: true
    hostname: store.local
    ingressClassName: traefik
    annotations: {}

  # Note: WordPress URLs are configured via the postStart lifecycle hook
  # The setup script runs inside the WordPress container and configures:
  # - wp-config.php hostname for WP_CLI
  # - .htaccess for permalinks
  # - WordPress and WooCommerce installation
  # - Sample products and payment gateways

mariadb:
  enabled: true
  auth:
    rootPassword: "root-password"
    database: bitnami_wordpress
  primary:
    persistence:
      enabled: true
      size: 1Gi

# Security & Isolation
networkPolicy:
  enabled: true

resourceQuota:
  enabled: true
  requests:
    cpu: "1"
    memory: "1Gi"
  limits:
    cpu: "2"
    memory: "2Gi"

limitRange:
  enabled: true
  default:
    cpu: "500m"
    memory: "512Mi"
  defaultRequest:
    cpu: "100m"
    memory: "256Mi"
